services:
  - type: web
    name: atlas-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/atlas_app_server.py --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_OWNER
        value: tapaskumarmitra
      - key: GITHUB_REPO
        value: tapaskumarmitra.github.io
      - key: GITHUB_BRANCH
        value: main
      - key: GITHUB_DATA_PATH
        value: assets/data/ruilings.json
      - key: GITHUB_TIMEOUT_SECONDS
        value: "30"
      - key: DB_CACHE_TTL_SECONDS
        value: "120"
      - key: SEARCH_LLM_TIMEOUT_SECONDS
        value: "14"
      - key: SEARCH_LLM_CANDIDATE_LIMIT
        value: "36"
      - key: SEARCH_CACHE_TTL_SECONDS
        value: "900"
      - key: SEARCH_CACHE_MAX_ENTRIES
        value: "180"
      - key: ADD_LLM_TIMEOUT_SECONDS
        value: "20"
      - key: ALLOWED_ORIGINS
        sync: false
