services:
  - type: web
    name: atlas-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/atlas_app_server.py --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_OWNER
        value: tapaskumarmitra
      - key: GITHUB_REPO
        value: tapaskumarmitra.github.io
      - key: GITHUB_BRANCH
        value: main
      - key: GITHUB_DATA_PATH
        value: assets/data/ruilings.json
      - key: GITHUB_TIMEOUT_SECONDS
        value: "30"
      - key: ALLOWED_ORIGINS
        sync: false
