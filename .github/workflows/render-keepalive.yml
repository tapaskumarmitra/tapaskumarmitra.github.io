name: Render Keepalive

on:
  schedule:
    # GitHub Actions cron runs in UTC.
    # Target window: 06:00 to 23:59 IST (UTC+05:30), every ~14 minutes.
    # 00:30-00:58 UTC
    - cron: "30,44,58 0 * * *"
    # 01:00-17:56 UTC
    - cron: "0,14,28,42,56 1-17 * * *"
    # 18:00-18:28 UTC
    - cron: "0,14,28 18 * * *"
  workflow_dispatch:

jobs:
  ping-render-health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RENDER_HEALTH_URL: https://atlas-api-kh7d.onrender.com/health
    steps:
      - name: Ping Render health endpoint
        shell: bash
        run: |
          set -euo pipefail

          echo "Pinging: ${RENDER_HEALTH_URL}"

          for attempt in 1 2 3; do
            http_code="$(curl -sS -o health.json -w "%{http_code}" --max-time 25 "${RENDER_HEALTH_URL}" || true)"
            echo "Attempt ${attempt}: HTTP ${http_code}"
            if [ "${http_code}" = "200" ]; then
              echo "Health response:"
              cat health.json
              exit 0
            fi
            sleep 10
          done

          echo "Failed to get healthy response from Render service."
          [ -f health.json ] && cat health.json || true
          exit 1
