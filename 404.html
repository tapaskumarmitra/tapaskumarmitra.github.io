<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Mitra Legal Services</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link href="assets/css/style.css" rel="stylesheet">

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32x32.png">
  <link rel="shortcut icon" href="favicon.ico">
  <meta name="theme-color" content="#0A0A0A">

  <style>
    .error-page {
      min-height: 100vh;
      background-color: #0A0A0A;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1rem;
      position: relative;
      overflow: hidden;
    }

    .error-bg {
      position: absolute;
      inset: 0;
      background-image: url('assets/img/hero-bg-pattern.svg');
      background-size: 400px 400px;
      opacity: 0.05;
      pointer-events: none;
    }

    .error-content {
      position: relative;
      z-index: 1;
      max-width: 520px;
      margin: 0 auto;
    }

    .error-logo {
      width: 90px;
      height: 90px;
      margin-bottom: 2rem;
      opacity: 0.85;
    }

    .error-code {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(5rem, 15vw, 9rem);
      font-weight: 900;
      color: #C8A45A;
      line-height: 1;
      margin-bottom: 0;
      letter-spacing: -0.02em;
    }

    .error-divider {
      display: block;
      width: 60px;
      height: 2px;
      background: linear-gradient(135deg, #C8A45A 0%, #E2C97E 50%, #C8A45A 100%);
      margin: 1.5rem auto;
      border-radius: 9999px;
    }

    .error-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      color: #FFFFFF;
      margin-bottom: 1rem;
    }

    .error-desc {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9375rem;
      color: #999999;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .error-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div class="error-page">
    <div class="error-bg" aria-hidden="true"></div>

    <div class="error-content">
      <img src="assets/img/logo.svg" alt="Mitra Legal Services" class="error-logo" loading="eager">

      <p class="error-code" aria-label="Error 404">404</p>

      <span class="error-divider" aria-hidden="true"></span>

      <h1 class="error-title">Page Not Found</h1>

      <p class="error-desc">
        The page you are looking for may have been moved, removed, or does not exist.<br>
        Please return to the homepage or use the navigation to find what you need.
      </p>

      <div class="error-actions">
        <a href="/" class="btn btn-gold-outline">
          <i class="bi bi-house me-2" aria-hidden="true"></i>Go to Homepage
        </a>
        <a href="/#contact" class="btn btn-ghost">
          <i class="bi bi-envelope me-2" aria-hidden="true"></i>Contact Us
        </a>
      </div>

      <p style="margin-top: 3rem; font-size: 0.8125rem; color: #555555;">
        <i class="bi bi-telephone-fill me-1" style="color: #C8A45A;" aria-hidden="true"></i>
        <a href="tel:+919433734997" style="color: #888888;">+91 94337 34997</a>
        &nbsp;·&nbsp;
        <a href="mailto:tapaskalyani.mitra@gmail.com" style="color: #888888;">tapaskalyani.mitra@gmail.com</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
