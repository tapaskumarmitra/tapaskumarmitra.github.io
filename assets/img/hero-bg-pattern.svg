<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <pattern id="laurelPattern" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <!-- Left branch -->
      <g stroke="#C8A45A" stroke-width="1" fill="none" opacity="0.07">
        <!-- Main stem -->
        <path d="M 20,180 Q 60,120 100,60"/>
        <!-- Leaves on left branch -->
        <ellipse cx="30" cy="162" rx="12" ry="5" transform="rotate(-50, 30, 162)" fill="#C8A45A"/>
        <ellipse cx="42" cy="144" rx="12" ry="5" transform="rotate(-45, 42, 144)" fill="#C8A45A"/>
        <ellipse cx="56" cy="126" rx="12" ry="5" transform="rotate(-42, 56, 126)" fill="#C8A45A"/>
        <ellipse cx="70" cy="108" rx="12" ry="5" transform="rotate(-38, 70, 108)" fill="#C8A45A"/>
        <ellipse cx="84" cy="90" rx="12" ry="5" transform="rotate(-35, 84, 90)" fill="#C8A45A"/>
        <ellipse cx="95" cy="72" rx="11" ry="5" transform="rotate(-32, 95, 72)" fill="#C8A45A"/>
        <!-- Right side leaves on same branch -->
        <ellipse cx="36" cy="158" rx="12" ry="5" transform="rotate(-130, 36, 158)" fill="#C8A45A"/>
        <ellipse cx="50" cy="140" rx="12" ry="5" transform="rotate(-125, 50, 140)" fill="#C8A45A"/>
        <ellipse cx="64" cy="122" rx="12" ry="5" transform="rotate(-122, 64, 122)" fill="#C8A45A"/>
        <ellipse cx="78" cy="104" rx="12" ry="5" transform="rotate(-118, 78, 104)" fill="#C8A45A"/>
        <ellipse cx="90" cy="86" rx="11" ry="5" transform="rotate(-115, 90, 86)" fill="#C8A45A"/>
      </g>
      <!-- Offset second branch -->
      <g stroke="#C8A45A" stroke-width="1" fill="none" opacity="0.07">
        <path d="M 120,200 Q 160,140 200,80"/>
        <ellipse cx="130" cy="182" rx="12" ry="5" transform="rotate(-50, 130, 182)" fill="#C8A45A"/>
        <ellipse cx="142" cy="164" rx="12" ry="5" transform="rotate(-45, 142, 164)" fill="#C8A45A"/>
        <ellipse cx="156" cy="146" rx="12" ry="5" transform="rotate(-42, 156, 146)" fill="#C8A45A"/>
        <ellipse cx="170" cy="128" rx="12" ry="5" transform="rotate(-38, 170, 128)" fill="#C8A45A"/>
        <ellipse cx="184" cy="110" rx="12" ry="5" transform="rotate(-35, 184, 110)" fill="#C8A45A"/>
        <ellipse cx="195" cy="92" rx="11" ry="5" transform="rotate(-32, 195, 92)" fill="#C8A45A"/>
        <ellipse cx="136" cy="178" rx="12" ry="5" transform="rotate(-130, 136, 178)" fill="#C8A45A"/>
        <ellipse cx="150" cy="160" rx="12" ry="5" transform="rotate(-125, 150, 160)" fill="#C8A45A"/>
        <ellipse cx="164" cy="142" rx="12" ry="5" transform="rotate(-122, 164, 142)" fill="#C8A45A"/>
        <ellipse cx="178" cy="124" rx="12" ry="5" transform="rotate(-118, 178, 124)" fill="#C8A45A"/>
        <ellipse cx="190" cy="106" rx="11" ry="5" transform="rotate(-115, 190, 106)" fill="#C8A45A"/>
      </g>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#laurelPattern)"/>
</svg>
