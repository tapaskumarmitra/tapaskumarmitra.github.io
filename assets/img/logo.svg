<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220" role="img" aria-label="Mitra Legal Services Logo">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <path id="topArc" d="M 22,110 A 88,88 0 0,1 198,110"/>
    <path id="bottomArc" d="M 44,162 A 72,72 0 0,0 176,162"/>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Outer thick gold ring -->
  <circle cx="110" cy="110" r="107" fill="url(#bgGrad)" stroke="#C8A45A" stroke-width="7"/>
  <!-- Inner decorative ring -->
  <circle cx="110" cy="110" r="95" fill="none" stroke="#C8A45A" stroke-width="1" opacity="0.5"/>
  <!-- Innermost subtle ring -->
  <circle cx="110" cy="110" r="91" fill="none" stroke="#C8A45A" stroke-width="0.5" opacity="0.3"/>

  <!-- Top arc text: MITRA LEGAL SERVICES -->
  <text font-family="Georgia, serif" font-size="12.5" fill="white" font-weight="700" letter-spacing="3" filter="url(#goldGlow)">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">MITRA LEGAL SERVICES</textPath>
  </text>

  <!-- ── SCALES OF JUSTICE ── -->
  <!-- Top finial -->
  <circle cx="110" cy="68" r="4" fill="#C8A45A"/>
  <!-- Vertical pillar -->
  <rect x="108.5" y="68" width="3" height="58" fill="#C8A45A" rx="1.5"/>
  <!-- Horizontal beam -->
  <rect x="72" y="86" width="76" height="3.5" fill="#C8A45A" rx="1.75"/>
  <!-- Center pin on beam -->
  <circle cx="110" cy="87.75" r="4.5" fill="#C8A45A"/>
  <!-- Left suspension chain -->
  <line x1="81" y1="89.5" x2="78" y2="110" stroke="#C8A45A" stroke-width="1.5"/>
  <line x1="81" y1="89.5" x2="84" y2="110" stroke="#C8A45A" stroke-width="1.5"/>
  <!-- Right suspension chain -->
  <line x1="139" y1="89.5" x2="136" y2="110" stroke="#C8A45A" stroke-width="1.5"/>
  <line x1="139" y1="89.5" x2="142" y2="110" stroke="#C8A45A" stroke-width="1.5"/>
  <!-- Left pan -->
  <path d="M 68,110 Q 81,120 94,110" fill="none" stroke="#C8A45A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right pan -->
  <path d="M 126,110 Q 139,120 152,110" fill="none" stroke="#C8A45A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Base platform -->
  <rect x="96" y="126" width="28" height="3.5" fill="#C8A45A" rx="1.75"/>
  <!-- Base feet -->
  <rect x="93" y="129.5" width="34" height="2.5" fill="#C8A45A" rx="1.25"/>

  <!-- ── LAUREL WREATH — Left side ── -->
  <g fill="#C8A45A" opacity="0.88">
    <!-- Left leaf cluster -->
    <ellipse cx="68" cy="92" rx="7" ry="4" transform="rotate(-40, 68, 92)"/>
    <ellipse cx="62" cy="104" rx="7" ry="4" transform="rotate(-20, 62, 104)"/>
    <ellipse cx="61" cy="117" rx="7" ry="4" transform="rotate(5, 61, 117)"/>
    <ellipse cx="65" cy="129" rx="7" ry="4" transform="rotate(20, 65, 129)"/>
    <ellipse cx="73" cy="140" rx="7" ry="4" transform="rotate(40, 73, 140)"/>
    <!-- Stems -->
    <path d="M 72,82 Q 63,110 70,145" fill="none" stroke="#C8A45A" stroke-width="1.8"/>
  </g>

  <!-- ── LAUREL WREATH — Right side ── -->
  <g fill="#C8A45A" opacity="0.88">
    <ellipse cx="152" cy="92" rx="7" ry="4" transform="rotate(40, 152, 92)"/>
    <ellipse cx="158" cy="104" rx="7" ry="4" transform="rotate(20, 158, 104)"/>
    <ellipse cx="159" cy="117" rx="7" ry="4" transform="rotate(-5, 159, 117)"/>
    <ellipse cx="155" cy="129" rx="7" ry="4" transform="rotate(-20, 155, 129)"/>
    <ellipse cx="147" cy="140" rx="7" ry="4" transform="rotate(-40, 147, 140)"/>
    <!-- Stems -->
    <path d="M 148,82 Q 157,110 150,145" fill="none" stroke="#C8A45A" stroke-width="1.8"/>
  </g>

  <!-- Wreath bottom bow / knot -->
  <path d="M 96,148 Q 110,154 124,148" fill="none" stroke="#C8A45A" stroke-width="2"/>

  <!-- Stars flanking bottom -->
  <text x="88" y="157" font-size="11" fill="#C8A45A" text-anchor="middle" font-family="serif">★</text>
  <text x="132" y="157" font-size="11" fill="#C8A45A" text-anchor="middle" font-family="serif">★</text>

  <!-- ROUTE OF LAW — bottom text -->
  <text x="110" y="178" text-anchor="middle" font-family="Georgia, serif" font-size="10.5" fill="#C8A45A" font-weight="700" letter-spacing="4">ROUTE OF LAW</text>

  <!-- Decorative dots flanking bottom text -->
  <circle cx="57" cy="175" r="2" fill="#C8A45A" opacity="0.6"/>
  <circle cx="163" cy="175" r="2" fill="#C8A45A" opacity="0.6"/>
</svg>
